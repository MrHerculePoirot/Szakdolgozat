{% extends "base.html" %}

{% block title %}Pet Finder - Regisztráció{% endblock %}

{% block content %}
<div class="container register-page">
    <h2 class="mb-4 text-center">Regisztráció</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-warning alert-dismissible fade show mb-4" role="alert">
          {{ messages[-1] }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Bezárás">&times;</button>
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" id="regForm">
        <div class="mb-3">
            <input type="text" name="username" placeholder="Felhasználónév" required class="form-control py-3 shadow-sm">
        </div>
        <div class="mb-3">
            <input type="email" name="email" placeholder="Email cím" required class="form-control py-3 shadow-sm">
        </div>
        <div class="mb-3">
            <input type="password" name="password" placeholder="Jelszó" required class="form-control py-3 shadow-sm">
        </div>
        
        <div class="p-3 mb-4 info-box">
            <label class="small text-muted font-weight-bold mb-2 d-block">TELEFONSZÁM BEÁLLÍTÁSA</label>
            <div class="d-flex gap-2 info-box-2nd">
                <select name="country_idx" id="countrySelect" class="form-select">
                    {% for country in countries %}
                        <option value="{{ loop.index0 }}" data-len="{{ country.length }}">
                            {{ country.display }}
                        </option>
                    {% endfor %}
                </select>
                <input type="text" name="phone_number_local" id="phoneInput" placeholder="Szám" required class="form-control">
            </div>
            <div id="phoneHint" class="mt-2 text-info small"></div>
        </div>

        <div class="mb-4">
            <input type="text" name="social_link" placeholder="Közösségi média link (opcionális)" class="form-control py-3 shadow-sm">
        </div>
            
        <button type="submit" class="btn btn-primary btn-lg w-100 shadow">
            Regisztráció és hitelesítés
        </button>
    </form>
    
    <p class="mt-4 text-center text-muted small">
        Már van fiókod? <a href="/login" class="text-primary fw-bold">Jelentkezz be!</a>
    </p>
</div>

<script src="{{ url_for('static', filename='js/register.js') }}"></script>
{% endblock %}
