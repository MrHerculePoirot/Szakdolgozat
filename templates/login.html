{% extends "base.html" %}

{% block title %}Pet Finder - Térkép{% endblock %}

{% block content %}
<div class="container login-page">
    <div class="login-card">
        <h2>Bejelentkezés</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Jelszó" required>
            <button type="submit">Belépés</button>
        </form>
        <div class="reg-link">
            Nincs még fiókod? <a href="/register" style="color: #007bff; text-decoration: none;">Regisztrálj!</a>
        </div>
    </div>
</div>
{% endblock %}
