<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/OverlappingMarkerSpiderfier/1.0.3/oms.min.js"></script>

{% extends "base.html" %}

{% block title %}Pet Finder - Térkép{% endblock %}

{% block content %}
<div class="container map-page">
    <h1>Elveszett állatok térképe</h1>

    <div class="filter-wrapper">
    <select id="type-filter">
        <option value="all">Minden állat</option>
        <option value="dog">Csak kutyák</option>
        <option value="cat">Csak macskák</option>
        <option value="other">Egyéb</option>
    </select>
    </div>

    <div id="map"></div>

    <div id="map-data" 
        data-pets='{{ pets_metadata | tojson | safe }}'>
    </div>

    <script src="{{ url_for('static', filename='js/map_handler.js') }}"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key={{ api_key }}&callback=initMap" async defer></script>
</div>
{% endblock %}
