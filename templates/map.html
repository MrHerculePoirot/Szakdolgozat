<!DOCTYPE html>
<html>
<head>
    <title>Pet Finder - Térkép</title>
    <style>
        /* A stílust inkább ide tedd, így tiszta a HTML */
        #map { 
            height: 500px; 
            width: 100%; 
            border: 2px solid green; 
        }
    </style>
</head>
<body>
    <h1>Elveszett állatok térképe</h1>
    <div id="map"></div>

    <script>
        function initMap() {
            // Budapest koordinátái alapértelmezettnek
            const budapest = { lat: 47.4979, lng: 19.0402 };
            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 12,
                center: budapest,
                mapTypeId: 'roadmap'
            });
            
            // Ide jönnek majd a GeoJSON rétegeid vagy a DB markerek
            console.log("A térkép sikeresen inicializálva.");
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key={{ api_key }}&callback=initMap" async defer></script>
</body>
</html>
