{% extends "base.html" %}

{% block title %}Új állat rögzítése{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Új állat bejelentése</h2>
    <form method="POST" enctype="multipart/form-data">
        <label>Státusz:</label>
        <select name="status" required>
            <option value="LOST">Elveszett</option>
            <option value="FOUND">Talált</option>
            <option value="ADOPTION">Örökbe fogadható</option>
        </select>

        <label>Típus:</label>
        <select name="type" id="pet_type" required>
            <option value="dog">Kutya</option>
            <option value="cat">Macska</option>
            <option value="other">Egyéb</option>
        </select>

        <input type="text" name="name" placeholder="Állat neve (ha ismert)">
        
        <label>Fajta:</label>
        <select name="breed" id="pet_breed" required>
            <option value="" disabled selected>Válassz típust előbb!</option>
        </select>

        <label>Neme:</label>
        <select name="gender" required>
            <option value="Hím">Hím</option>
            <option value="Nőstény">Nőstény</option>
        </select>
        
        <label>Szín:</label>
        <select name="colour" required>
            <option value="" disabled selected>- válassz színt -</option>
            {% for color in colors %}
                <option value="{{ color }}">{{ color }}</option>
            {% endfor %}
        </select>

        <input type="text" name="chip_id" placeholder="Chip szám (15 számjegy)" pattern="\d{15}" maxlength="15">

        <div class="location-section">
            <h3>Helyszín adatai</h3>
            <label>Ország:</label>
            <input type="text" name="country" placeholder="Magyarország" required>
            <label>Város:</label>
            <input type="text" name="city" placeholder="Budapest" required>
            <label>Irányítószám:</label>
            <input type="text" name="postcode" placeholder="1051">
            <label>Utca:</label>
            <input type="text" name="street" placeholder="Példa utca 12.">
        </div>

        <label>Állat kora:</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" name="age" placeholder="Kor" min="0" style="flex: 2;">
            <select name="age_unit" style="flex: 1;">
                <option value="nap">nap</option>
                <option value="hét">hét</option>
                <option value="hónap" selected>hónap</option>
                <option value="év">év</option>
            </select>
        </div>

        <label>Ivartalanított?</label>
        <select name="is_neutered">
            <option value="false">Ivaros (nem)</option>
            <option value="true">Ivartalanított (igen)</option>
        </select>
        
        <label>Fotó feltöltése:</label>
        <input type="file" name="photo" accept="image/*">

        <label>Leírás:</label>
        <textarea name="description" rows="4"></textarea>

        <button type="submit" class="btn-submit">Rögzítés</button>
    </form>
</div>

<div id="breed-data" 
     data-dogs='{{ dog_breeds | tojson | safe }}' 
     data-cats='{{ cat_breeds | tojson | safe }}' 
     data-others='{{ other_breeds | tojson | safe }}'
     data-is-filter="false"
     style="display: none;">
</div>
<script src="{{ url_for('static', filename='js/breed_selector.js') }}"></script>

{% endblock %}
