<!DOCTYPE html>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pet Finder{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="/" class="nav-link">Térkép</a>
            <a href="{{ url_for('all_pets') }}" class="nav-link">Állatok</a>
        </div>
        <div class="nav-right">
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('my_pets') }}" class="user-link">{{ current_user.username }}</a>
                <a href="{{ url_for('add_pet') }}" class="nav-link">+ Új állat</a>
                <a href="/logout" class="nav-link">Kijelentkezés</a>
            {% else %}
                <span class="user-display">Nincs aktív fiók</span>
                <a href="/login" class="nav-link">Bejelentkezés</a>
                <a href="/register" class="nav-link">Regisztráció</a>
            {% endif %}
        </div>
    </nav>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
