<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pet Finder{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- MI - Az ikonok integrálásához AI asszisztenciát vettem igénybe. -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container base-page">
        <nav class="navbar">
            <div class="nav-left">
                <a href="/" class="nav-link"><i class="fas fa-map-marked-alt"></i> Térkép</a>
                <a href="{{ url_for('all_pets') }}" class="nav-link"><i class="fas fa-paw"></i> Állatok</a>
            </div>

            <div class="nav-right">
                {% if current_user.is_authenticated %}
                    <a href="{{ url_for('my_pets') }}" class="user-link">
                        <i class="fas fa-user"></i> {{ current_user.username }}
                    </a>
                    <a href="{{ url_for('add_pet') }}" class="nav-link">
                        <i class="fas fa-plus-circle"></i> Új állat hozzáadása
                    </a>
                    <a href="/logout" class="nav-link logout-link">
                        <i class="fas fa-sign-out-alt"></i> Kijelentkezés
                    </a>
                {% else %}
                    <span class="user-display">Nincs aktív fiók</span>
                    <a href="/login" class="nav-link">Bejelentkezés</a>
                    <a href="/register" class="nav-link">Regisztráció</a>
                {% endif %}
            </div>
        </nav>

        <main class="main-content mt-4">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
